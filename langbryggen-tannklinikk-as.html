<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Langbryggen Tannklinikk AS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; color: #1e293b; }

/* DEMO BANNER */
.demo-banner {
background: #dc2626;
color: white;
text-align: center;
padding: 12px 20px;
font-weight: 700;
font-size: 15px;
animation: blink 1.2s step-start infinite;
letter-spacing: 0.5px;
z-index: 9999;
position: relative;
}
@keyframes blink {
0%, 100% { background: #dc2626; }
50% { background: #7f1d1d; }
}

/* NAV */
nav {
background: #1e40af;
padding: 0 5%;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 1000;
box-shadow: 0 2px 12px rgba(0,0,0,0.18);
min-height: 68px;
}
.nav-logo {
color: white;
font-size: 22px;
font-weight: 800;
letter-spacing: 0.5px;
text-decoration: none;
line-height: 1.2;
}
.nav-logo span { color: #93c5fd; font-size: 13px; display: block; font-weight: 400; letter-spacing: 1px; }
.nav-links { display: flex; gap: 28px; list-style: none; }
.nav-links a {
color: #bfdbfe;
text-decoration: none;
font-size: 15px;
font-weight: 500;
transition: color 0.2s;
}
.nav-links a:hover { color: white; }
.nav-cta {
background: white;
color: #1e40af;
padding: 10px 22px;
border-radius: 25px;
font-weight: 700;
text-decoration: none;
font-size: 15px;
transition: background 0.2s, color 0.2s;
white-space: nowrap;
}
.nav-cta:hover { background: #dbeafe; }
.hamburger {
display: none;
flex-direction: column;
cursor: pointer;
gap: 5px;
background: none;
border: none;
padding: 5px;
}
.hamburger span {
display: block;
width: 26px;
height: 3px;
background: white;
border-radius: 2px;
transition: all 0.3s;
}
.mobile-menu {
display: none;
background: #1e3a8a;
padding: 20px 5%;
flex-direction: column;
gap: 16px;
}
.mobile-menu a {
color: #bfdbfe;
text-decoration: none;
font-size: 16px;
font-weight: 500;
padding: 8px 0;
border-bottom: 1px solid #2d4fba;
}
.mobile-menu a:hover { color: white; }
.mobile-menu.open { display: flex; }

/* HERO */
.hero {
background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 50%, #172554 100%);
min-height: 88vh;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
padding: 60px 5%;
position: relative;
overflow: hidden;
}
.hero::before {
content: '';
position: absolute;
top: -60px; right: -60px;
width: 400px; height: 400px;
background: rgba(255,255,255,0.04);
border-radius: 50%;
}
.hero::after {
content: '';
position: absolute;
bottom: -80px; left: -80px;
width: 500px; height: 500px;
background: rgba(255,255,255,0.03);
border-radius: 50%;
}
.hero-content { max-width: 760px; position: relative; z-index: 1; }
.hero-badge {
display: inline-block;
background: rgba(255,255,255,0.12);
color: #93c5fd;
padding: 7px 20px;
border-radius: 20px;
font-size: 13px;
font-weight: 600;
letter-spacing: 1.5px;
text-transform: uppercase;
margin-bottom: 24px;
border: 1px solid rgba(255,255,255,0.15);
}
.hero h1 {
color: white;
font-size: clamp(32px, 5vw, 58px);
font-weight: 800;
line-height: 1.15;
margin-bottom: 22px;
}
.hero h1 span { color: #93c5fd; }
.hero p {
color: #bfdbfe;
font-size: clamp(16px, 2vw, 19px);
line-height: 1.7;
margin-bottom: 38px;
max-width: 580px;
margin-left: auto;
margin-right: auto;
}
.hero-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.btn-primary {
background: white;
color: #1e40af;
padding: 16px 36px;
border-radius: 30px;
font-weight: 700;
font-size: 17px;
text-decoration: none;
transition: all 0.25s;
box-shadow: 0 4px 20px rgba(0,0,0,0.15);
display: inline-block;
}
.btn-primary:hover { background: #dbeafe; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.2); }
.btn-secondary {
background: transparent;
color: white;
padding: 16px 36px;
border-radius: 30px;
font-weight: 600;
font-size: 17px;
text-decoration: none;
border: 2px solid rgba(255,255,255,0.5);
transition: all 0.25s;
display: inline-block;
}
.btn-secondary:hover { border-color: white; background: rgba(255,255,255,0.08); transform: translateY(-2px); }
.hero-stats {
display: flex;
justify-content: center;
gap: 48px;
margin-top: 52px;
flex-wrap: wrap;
}
.hero-stat { color: white; text-align: center; }
.hero-stat .num { font-size: 36px; font-weight: 800; color: #93c5fd; display: block; }
.hero-stat .label { font-size: 13px; color: #bfdbfe; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

/* SECTIONS */
section { padding: 80px 5%; }
.section-header { text-align: center; margin-bottom: 56px; }
.section-tag {
display: inline-block;
background: #dbeafe;
color: #1e40af;
padding: 5px 16px;
border-radius: 15px;
font-size: 12px;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
margin-bottom: 14px;
}
.section-header h2 {
font-size: clamp(26px, 4vw, 40px);
font-weight: 800;
color: #1e293b;
margin-bottom: 14px;
}
.section-header p {
color: #64748b;
font-size: 17px;
max-width: 560px;
margin: 0 auto;
line-height: 1.7;
}

/* SERVICES */
.services { background: #f8faff; }
.services-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
gap: 28px;
max-width: 1100px;
margin: 0 auto;
}
.service-card {
background: white;
border-radius: 18px;
padding: 36px 28px;
text-align: center;
box-shadow: 0 2px 16px rgba(30,64,175,0.07);
transition: all 0.3s;
border: 1px solid #e2e8f0;
position: relative;
overflow: hidden;
}
.service-card::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0;
height: 4px;
background: linear-gradient(90deg, #1e40af, #3b82f6);
opacity: 0;
transition: opacity 0.3s;
}
.service-card:hover { transform: translateY(-6px); box-shadow: 0 12px 36px rgba(30,64,175,0.14); }
.service-card:hover::before { opacity: 1; }
.service-icon {
width: 72px;
height: 72px;
background: linear-gradient(135deg, #dbeafe, #eff6ff);
border-radius: 20px;
display: flex;
align-items: center;
justify-content: center;
margin: 0 auto 22px;
font-size: 32px;
transition: background 0.3s;
}
.service-card:hover .service-icon { background: linear-gradient(135deg, #1e40af, #3b82f6); }
.service-card h3 { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 12px; }
.service-card p { color: #64748b; font-size: 15px; line-height: 1.7; }

/* ABOUT */
.about { background: white; }
.about-inner {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 64px;
align-items: center;
max-width: 1100px;
margin: 0 auto;
}
.about-img-wrap {
position: relative;
border-radius: 24px;
overflow: hidden;
min-height: 420px;
background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 60%, #172554 100%);
display: flex;
align-items: center;
justify-content: center;
}
.about-img-inner {
text-align: center;
padding: 40px;
}
.about-img-inner .big-icon { font-size: 90px; margin-bottom: 20px; display: block; }
.about-img-inner p { color: #bfdbfe; font-size: 17px; line-height: 1.6; }
.about-img-inner strong { color: white; font-size: 22px; display: block; margin-top: 16px; font-weight: 700; }
.about-badge {
position: absolute;
bottom: 24px; right: 24px;
background: white;
border-radius: 14px;
padding: 14px 20px;
text-align: center;
box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.about-badge .badge-num { font-size: 28px; font-weight: 800; color: #1e40af; display: block; }
.about-badge .badge-txt { font-size: 12px; color: #64748b; font-weight: 600; }
.about-text h2 { font-size: clamp(26px, 3.5vw, 38px); font-weight: 800; color: #1e293b; margin-bottom: 20px; line-height: 1.2; }
.about-text p { color: #64748b; font-size: 16px; line-height: 1.8; margin-bottom: 18px; }
.about-features { list-style: none; margin: 24px 0 32px; display: flex; flex-direction: column; gap: 14px; }
.about-features li {
display: flex;
align-items: center;
gap: 12px;
color: #374151;
font-size: 15px;
font-weight: 500;
}
.check-icon {
width: 26px; height: 26px;
background: #dbeafe;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
color: #1e40af;
font-size: 13px;
font-weight: 700;
flex-shrink: 0;
}

/* REVIEWS */
.reviews { background: #f8faff; }
.reviews-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 28px;
max-width: 1100px;
margin: 0 auto;
}
.review-card {
background: white;
border-radius: 18px;
padding: 32px 28px;
box-shadow: 0 2px 16px rgba(30,64,175,0.07);
border: 1px solid #e2e8f0;
transition: all 0.3s;
}
.review-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(30,64,175,0.12); }
.stars { color: #f59e0b; font-size: 20px; margin-bottom: 16px; letter-spacing: 2px; }
.review-text { color: #374151; font-size: 15px; line-height: 1.75; margin-bottom: 22px; font-style: italic; }
.review-author { display: flex; align-items: center; gap: 14px; }
.author-avatar {
width: 48px; height: 48px;
border-radius: 50%;
background: linear-gradient(135deg, #1e40af, #3b82f6);
display: flex;
align-items: center;
justify-content: center;
color: white;
font-size: 20px;
font-weight: 700;
flex-shrink: 0;
}
.author-name { font-weight: 700; color: #1e293b; font-size: 15px; }
.author-since { color: #94a3b8; font-size: 13px; margin-top: 2px; }

/* CONTACT */
.contact { background: white; }
.contact-inner {
display: grid;
grid-template-columns: 1fr 1.2fr;
gap: 56px;
max-width: 1100px;
margin: 0 auto;
align-items: start;
}
.contact-info h2 { font-size: clamp(24px, 3vw, 36px); font-weight: 800; color: #1e293b; margin-bottom: 16px
