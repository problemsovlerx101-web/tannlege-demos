<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Langbryggen Tannklinikk AS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #1e293b; background: #fff; }

  /* DEMO BANNER */
  .demo-banner {
    background: #dc2626;
    color: #fff;
    text-align: center;
    padding: 12px 20px;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.5px;
    animation: blink 1.2s step-start infinite;
    position: relative;
    z-index: 1000;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* NAVIGATION */
  nav {
    background: #1e40af;
    position: sticky;
    top: 0;
    z-index: 999;
    box-shadow: 0 2px 12px rgba(30,64,175,0.3);
  }
  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 70px;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .nav-logo-icon {
    width: 44px;
    height: 44px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .nav-logo-icon svg { width: 26px; height: 26px; }
  .nav-logo-text { color: #fff; }
  .nav-logo-text .clinic-name { font-size: 1.15rem; font-weight: 700; line-height: 1.2; }
  .nav-logo-text .clinic-sub { font-size: 0.72rem; opacity: 0.85; letter-spacing: 0.3px; }
  .nav-links { display: flex; gap: 8px; align-items: center; }
  .nav-links a {
    color: #fff;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 500;
    transition: background 0.2s;
  }
  .nav-links a:hover { background: rgba(255,255,255,0.18); }
  .nav-links .btn-nav {
    background: #fff;
    color: #1e40af;
    font-weight: 700;
    padding: 9px 18px;
  }
  .nav-links .btn-nav:hover { background: #e0e7ff; }
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 6px;
    background: none;
    border: none;
  }
  .hamburger span {
    display: block;
    width: 26px;
    height: 3px;
    background: #fff;
    border-radius: 2px;
    transition: all 0.3s;
  }
  .mobile-menu {
    display: none;
    background: #1e3a8a;
    padding: 12px 0;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .mobile-menu.open { display: block; }
  .mobile-menu a {
    display: block;
    color: #fff;
    text-decoration: none;
    padding: 12px 24px;
    font-size: 1rem;
    font-weight: 500;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    transition: background 0.2s;
  }
  .mobile-menu a:hover { background: rgba(255,255,255,0.1); }
  .mobile-menu a.btn-nav-mob {
    margin: 12px 24px 4px;
    background: #fff;
    color: #1e40af;
    border-radius: 8px;
    text-align: center;
    font-weight: 700;
    border: none;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 40%, #2563eb 70%, #3b82f6 100%);
    padding: 90px 24px 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 350px; height: 350px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 280px; height: 280px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .hero-content { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.18);
    color: #fff;
    padding: 7px 18px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 24px;
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(4px);
  }
  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: #fff;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 20px;
  }
  .hero h1 span { color: #bfdbfe; }
  .hero p {
    font-size: 1.15rem;
    color: rgba(255,255,255,0.88);
    margin-bottom: 36px;
    line-height: 1.7;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .hero-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    background: #fff;
    color: #1e40af;
    padding: 16px 36px;
    border-radius: 50px;
    font-size: 1.05rem;
    font-weight: 700;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
    border: none;
    cursor: pointer;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(0,0,0,0.28); }
  .btn-secondary {
    background: transparent;
    color: #fff;
    padding: 15px 30px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 2px solid rgba(255,255,255,0.6);
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.15); border-color: #fff; }
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 52px;
    flex-wrap: wrap;
  }
  .stat-item { text-align: center; color: #fff; }
  .stat-num { font-size: 2rem; font-weight: 800; display: block; }
  .stat-label { font-size: 0.82rem; opacity: 0.8; margin-top: 2px; }

  /* SECTION COMMON */
  section { padding: 80px 24px; }
  .section-label {
    text-align: center;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #1e40af;
    margin-bottom: 10px;
  }
  .section-title {
    text-align: center;
    font-size: clamp(1.7rem, 3.5vw, 2.4rem);
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 14px;
    line-height: 1.2;
  }
  .section-subtitle {
    text-align: center;
    font-size: 1.05rem;
    color: #64748b;
    max-width: 600px;
    margin: 0 auto 52px;
    line-height: 1.7;
  }

  /* SERVICES */
  .services { background: #f8fafc; }
  .services-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }
  .service-card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 28px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    cursor: default;
  }
  .service-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 36px rgba(30,64,175,0.14);
    border-color: #bfdbfe;
  }
  .service-icon {
    width: 60px; height: 60px;
    background: #eff6ff;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  .service-icon svg { width: 30px; height: 30px; color: #1e40af; }
  .service-card h3 { font-size: 1.15rem; font-weight: 700; color: #0f172a; margin-bottom: 10px; }
  .service-card p { font-size: 0.92rem; color: #64748b; line-height: 1.65; }
  .service-tag {
    display: inline-block;
    margin-top: 16px;
    font-size: 0.78rem;
    font-weight: 600;
    color: #1e40af;
    background: #eff6ff;
    padding: 4px 12px;
    border-radius: 50px;
  }

  /* ABOUT */
  .about { background: #fff; }
  .about-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }
  .about-visual {
    position: relative;
  }
  .about-img-box {
    background: linear-gradient(135deg, #1e40af, #3b82f6);
    border-radius: 20px;
    padding: 48px 40px;
    color: #fff;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .about-img-box::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .about-img-box svg { width: 90px; height: 90px; opacity: 0.9; margin-bottom: 16px; }
  .about-img-box h3 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
  .about-img-box p { opacity: 0.88; font-size: 0.95rem; line-height: 1.6; }
  .about-features { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  .about-feat-item {
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: left;
    backdrop-filter: blur(4px);
  }
  .about-feat-item .feat-icon { font-size: 1.4rem; margin-bottom: 6px; }
  .about-feat-item span { font-size: 0.82rem; font-weight: 600; display: block; }
  .about-content h2 { font-size: clamp(1.7rem, 3vw, 2.2rem); font-weight: 800; color: #0f172a; margin-bottom: 18px; line-height: 1.2; }
  .about-content .lead { font-size: 1.05rem; color: #475569; line-height: 1.75; margin-bottom: 22px; }
  .about-list { list-style: none; margin-bottom: 30px; }
  .about-list li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 13px;
    font-size: 0.96rem;
    color: #334155;
    line-height: 1.5;
  }
  .about-list li .check {
    width: 22px; height: 22px;
    background: #1e40af;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .about-list
